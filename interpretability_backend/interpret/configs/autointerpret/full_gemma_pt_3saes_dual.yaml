# Base-model (pt) companion to full_gemma_3saes_max.yaml.
#
# Same three SAE sites, but on google/gemma-3-4b-PT (the pretrained/base
# model, not instruction-tuned) with the matching pt-variant Gemma-scope
# SAEs (google/gemma-scope-2-4b-pt). The base model is a cleaner feature
# extractor for classification probing (no instruction-tuning distortion);
# it isn't used for behaviour steering. Distinct neuronpedia_model_id
# (gemma-3-4b, no -it) ⇒ no store/label collision with the it run.
#
# One forward pass per WordNet entry produces TWELVE stores:
#   SAE features  (sparse) — 3 SAEs × {last_token, max_prefill}:
#     L9_w16k_resid_post_{last_token,max_prefill}
#     L29_w16k_resid_post_{last_token,max_prefill}
#     L29_w65k_resid_post_{last_token,max_prefill}
#   Raw residuals (dense float32) — 3 sites × {last_token, max_prefill}:
#     L9_post_mlp_{last_token,max_prefill}    ← raw resid_post at the L9 SAE site
#     L29_post_mlp_{last_token,max_prefill}   ← raw resid_post at the L29 SAE site
#     final_norm_{last_token,max_prefill}     ← base-model sentence embedding
# post_mlp at layer L is exactly the resid_post vector the layer-L SAE
# encodes, so raw-dim-vs-SAE-feature is a same-site paired comparison.
# max_prefill / mean_prefill exclude the BOS position (extreme outlier).
#
# Expected runtime on MPS: ~7.5 h (212,478 samples at ~8 samples/s; the
# extra cache reads + dense writes are marginal next to the forward).
# Storage: ~20 GB total (6 dense float32 stores ≈ 2.2 GB each). Lives on
# /Volumes/Storage via the resources/sae_autointerpret symlink.
# Safe to interrupt: resume skips samples already in every store.

run_slug: full_gemma_pt_L9-16k_L29-16k_L29-65k_dual

collect:
  base_model:
    family: gemma
    checkpoint: google/gemma-3-4b-pt
    device: mps
    dtype: bfloat16
    add_bos: true
    use_chat_template: false
  saes:
    - { family: gemma, layer_index: 9,  hook_type: resid_post, width: "16k", l0_size: medium, model_size: "4b", variant: pt }
    - { family: gemma, layer_index: 29, hook_type: resid_post, width: "16k", l0_size: medium, model_size: "4b", variant: pt }
    - { family: gemma, layer_index: 29, hook_type: resid_post, width: "65k", l0_size: medium, model_size: "4b", variant: pt }
  aggregation: [last_token, max_prefill]
  residual:
    sites:
      - { layer_index: 9,  intermediate: post_mlp }
      - { layer_index: 29, intermediate: post_mlp }
      - { intermediate: final_norm }
    activation_dtype: float32
    aggregation: [last_token, max_prefill]
  limit: null
  pos_filter: null
  prompt_template: "{word}: {definition}."
  add_bos: true
  use_chat_template: false
  output_root: resources/sae_autointerpret
  activation_dtype: float16
  sparse_threshold: 1.0e-6
  flush_every: 500
  resume: true
  wordnet_xml_path: resources/dictionaries/english-wordnet-2024.xml

extract:
  top_k: 50
  eval_sample_count: 50
  eval_shuffle_seed: 42
  density_min: 1.0e-5
  density_max: 0.3
  require_min_nonzero: 50
  feature_indices: null

agents:
  label_task: autointerpret-label
  eval_task: autointerpret-eval
  label_workers: 5
  label_reps_per_worker: 100
  eval_workers: 5
  eval_reps_per_worker: 100
  show_zero_fraction_to_evaluator: ab
  poll_interval_seconds: 30
  label_input_dir: resources/jobs/autointerpret-label/input
  label_results_dir: resources/jobs/autointerpret-label/queue/results
  eval_input_dir: resources/jobs/autointerpret-eval/input
  eval_results_dir: resources/jobs/autointerpret-eval/queue/results
  fail_on_queue_errors: true

score:
  # Off: no Gemma-scope-pt label store is initialised, and the push is
  # unconditional (writes under the SAE config's model id). Keep raw scores.
  write_to_label_store: false
  label_store_dir: resources/sae_labels/neuronpedia_gemma-3-4b
  method_name: autointerpret
  min_pearson: 0.3
  report_ab_split: true

stages:
  # Collect-only: this run banks the 12 stores. Downstream label/eval/score
  # are driven by separate per-store configs once collection completes.
  skip_collect: false
  skip_topk: true
  skip_label: true
  skip_eval: true
  skip_score: true
