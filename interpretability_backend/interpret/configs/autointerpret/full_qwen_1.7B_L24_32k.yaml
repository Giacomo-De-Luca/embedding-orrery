# Qwen3-1.7B-Base stage-1 collect with Qwen-scope L24 W32K L0=50 SAE.
#
# Mirror of full_gemma_3saes.yaml for the Qwen family. ``base_model.family``
# switches the wrapper factory in collect_activations.py to
# Qwen3Inference; the same SparseActivationStore + AutoInterpretRunner
# code paths handle Qwen-scope TopK SAEs without further changes
# (``QwenScopeSAEConfig`` dispatch is built into ``loading.load_sae``).
#
# Layer 24 of 28 ≈ 85 % depth, mirroring Gemma's L29/34. Extend the
# ``saes:`` list to cover other Qwen layers; their activations join the
# same collect pass (one Qwen forward + N SAE encodes).
#
# Expected runtime on MPS: ~3 h (~50 ms forward on a 1.7B + one TopK
# encode). Single-SAE layout — no per-SAE subdir, activations.npz lands
# directly under run_dir.

run_slug: full_qwen_1.7B_L24_w32k_l0_50

collect:
  base_model:
    family: qwen
    checkpoint: Qwen/Qwen3-1.7B-Base
    device: mps
    dtype: bfloat16
    add_bos: true
    use_chat_template: false
  saes:
    - { family: qwen, layer_index: 24, hook_type: resid_post, model_size: "1.7B", width: "32k", k: 50 }
  aggregation: last_token
  limit: null
  pos_filter: null
  prompt_template: "{word}: {definition}."
  add_bos: true
  use_chat_template: false
  output_root: resources/sae_autointerpret
  activation_dtype: float16
  sparse_threshold: 1.0e-6
  flush_every: 500
  resume: true
  wordnet_xml_path: resources/dictionaries/english-wordnet-2024.xml

extract:
  top_k: 50
  eval_sample_count: 50
  eval_shuffle_seed: 42
  density_min: 1.0e-5
  density_max: 0.3
  require_min_nonzero: 50
  feature_indices: null

agents:
  label_task: autointerpret-label
  eval_task: autointerpret-eval
  label_workers: 5
  label_reps_per_worker: 100
  eval_workers: 5
  eval_reps_per_worker: 100
  show_zero_fraction_to_evaluator: ab
  poll_interval_seconds: 30
  label_input_dir: resources/jobs/autointerpret-label/input
  label_results_dir: resources/jobs/autointerpret-label/queue/results
  eval_input_dir: resources/jobs/autointerpret-eval/input
  eval_results_dir: resources/jobs/autointerpret-eval/queue/results
  fail_on_queue_errors: true

score:
  # Off until a label store for Qwen-scope is deliberately initialised:
  # the push writes under the SAE config's model id into label_store_dir
  # unconditionally (there is no dir/model-id mismatch guard), and
  # FeatureLabelStore requires the dir to already exist.
  write_to_label_store: false
  label_store_dir: resources/sae_labels/qwen_1.7B_base
  method_name: autointerpret
  min_pearson: 0.3
  report_ab_split: true

stages:
  skip_collect: false
  skip_topk: true
  skip_label: true
  skip_eval: true
  skip_score: true
