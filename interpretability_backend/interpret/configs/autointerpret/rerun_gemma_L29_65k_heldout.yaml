# Held-out + thinking re-run of the Gemma L29 w65k SAE — de-contaminated.
#
# Mirrors rerun_gemma_L29_16k_heldout.yaml. Reuses the activations collected by
# full_gemma_3saes.yaml (the full_gemma_L9-16k_L29-16k_L29-65k/L29_65k subdir),
# staged into this run dir as read-only SYMLINKS so the original run is never
# modified. extract runs here (skip_topk: false), so the eval set is regenerated
# with the held-out fix in extract_top_k.py (linspace disjoint from top-k).
#
# Agents: sonnet at effort:high (.claude/agents/*.md frontmatter), one fresh
# agent per feature (reps_per_worker: 1). 200 label + 200 eval agent sessions,
# 5 concurrent.
run_slug: rerun_gemma_L29_65k_heldout

collect:
  base_model:
    family: gemma
    checkpoint: google/gemma-3-4b-it
    device: mps
    dtype: bfloat16
    add_bos: true
    use_chat_template: false
  saes:
    - { family: gemma, layer_index: 29, hook_type: resid_post, width: "65k", l0_size: medium, model_size: "4b", variant: it }
  aggregation: last_token
  output_root: resources/sae_autointerpret
  prompt_template: "{word}: {definition}."
  wordnet_xml_path: resources/dictionaries/english-wordnet-2024.xml

extract:
  top_k: 50
  eval_sample_count: 50
  eval_shuffle_seed: 42
  density_min: 1.0e-5
  density_max: 0.3
  require_min_nonzero: 50
  feature_indices: [
    5, 6, 7, 12, 18, 21, 22, 25, 26, 27, 29, 30, 34, 36, 38, 46,
    52, 55, 58, 61, 64, 65, 66, 68, 72, 74, 75, 91, 93, 97, 108, 112,
    114, 118, 120, 121, 138, 139, 142, 144, 145, 146, 147, 157, 158, 159, 160, 164,
    165, 168, 176, 178, 184, 186, 187, 189, 191, 196, 197, 201, 202, 207, 210, 212,
    214, 216, 217, 218, 220, 228, 234, 237, 241, 243, 244, 246, 249, 251, 255, 256,
    267, 269, 270, 271, 278, 286, 287, 288, 291, 306, 307, 308, 309, 316, 319, 330,
    333, 344, 349, 350, 356, 357, 358, 366, 374, 375, 376, 379, 382, 384, 386, 395,
    405, 407, 411, 414, 425, 430, 436, 441, 444, 449, 455, 461, 469, 474, 479, 480,
    482, 485, 490, 493, 495, 504, 511, 512, 518, 519, 522, 523, 525, 533, 534, 535,
    539, 547, 548, 549, 553, 554, 555, 560, 562, 570, 574, 577, 582, 585, 594, 597,
    600, 601, 604, 608, 612, 615, 619, 630, 631, 632, 633, 634, 635, 637, 640, 647,
    650, 659, 670, 677, 680, 682, 684, 689, 699, 701, 706, 709, 711, 712, 713, 719,
    721, 724, 728, 730, 733, 741, 746, 751]

agents:
  label_task: autointerpret-label
  eval_task: autointerpret-eval
  model_override: sonnet
  label_workers: 5
  label_reps_per_worker: 1
  eval_workers: 5
  eval_reps_per_worker: 1
  show_zero_fraction_to_evaluator: "off"
  poll_interval_seconds: 15
  fail_on_queue_errors: false
  label_input_dir: resources/jobs/autointerpret-label/input
  label_results_dir: resources/jobs/autointerpret-label/queue/results
  eval_input_dir: resources/jobs/autointerpret-eval/input
  eval_results_dir: resources/jobs/autointerpret-eval/queue/results

score:
  write_to_label_store: false
  min_pearson: -1.0
  report_ab_split: false

stages:
  skip_collect: true     # reuse the staged (symlinked) activations
  skip_topk: false       # re-extract -> regenerates the HELD-OUT eval set
  skip_label: false
  skip_eval: false
  skip_score: false
