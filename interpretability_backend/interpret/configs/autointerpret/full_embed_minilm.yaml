# Full run: autointerpret on ALL 384 all-MiniLM-L6-v2 embedding dimensions
# (SIGNED mode) over the whole WordNet corpus (~200k word/synset pairs).
# Labels every dimension (no selection filter) — the unbiased baseline to
# compare against SAE-feature monosemanticity.
run_slug: emb_minilm_signed_full

collect:
  source_kind: embedding
  limit: null                        # full WordNet
  prompt_template: "{word}: {definition}."
  output_root: resources/sae_autointerpret
  wordnet_xml_path: resources/dictionaries/english-wordnet-2024.xml
  flush_every: 20000                 # few rewrites over the full pass
  resume: true
  embedding:
    provider: sentence_transformers
    model_name: all-MiniLM-L6-v2
    device: mps
    normalize: false
    prompt: null
    activation_dtype: float16        # ~200k x 384 x fp16 ≈ 150 MB
    embed_batch_size: 128

extract:
  dim_mode: signed
  select: all                        # all 384 dims
  top_k: 20
  eval_sample_count: 50
  feature_indices: null

agents:
  label_task: autointerpret-embed-axis-label
  eval_task: autointerpret-embed-axis-eval
  label_workers: 5
  label_reps_per_worker: 100
  eval_workers: 5
  eval_reps_per_worker: 100
  show_zero_fraction_to_evaluator: "off"
  label_input_dir: resources/jobs/autointerpret-embed-axis-label/input
  label_results_dir: resources/jobs/autointerpret-embed-axis-label/queue/results
  eval_input_dir: resources/jobs/autointerpret-embed-axis-eval/input
  eval_results_dir: resources/jobs/autointerpret-embed-axis-eval/queue/results

score:
  write_to_label_store: false
  min_pearson: -1.0
  report_ab_split: false

stages:
  skip_collect: false
  skip_topk: false
  skip_label: false
  skip_eval: false
  skip_score: false
