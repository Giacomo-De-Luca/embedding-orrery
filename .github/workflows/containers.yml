name: Test and publish containers

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: containers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check interpretability_backend
      - run: uv run python -m pytest interpretability_backend/unit_tests -q

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: embedding_visualization
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: embedding_visualization/package-lock.json
      - run: npm ci
      - run: npm run test:run

  validate-images:
    if: github.event_name == 'pull_request'
    needs:
      - backend-tests
      - frontend-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          platforms: linux/amd64
          load: true
          push: false
          tags: orrery-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: embedding_visualization
          file: embedding_visualization/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: orrery-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Validate nginx gateway configuration
        run: >-
          docker run --rm
          -v "$PWD/deploy/compose/nginx.conf:/etc/nginx/nginx.conf:ro"
          nginx:alpine nginx -t
      - name: Smoke test image-only stack
        run: |
          docker compose --env-file /dev/null up --no-build -d gateway
          for attempt in {1..60}; do
            if curl -fsS http://localhost:3000/health >/dev/null \
              && curl -fsS http://localhost:3000/ >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          docker compose --env-file /dev/null ps
          docker compose --env-file /dev/null logs backend frontend gateway
          exit 1
      - if: always()
        run: docker compose --env-file /dev/null down --volumes

  publish-images:
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v'))
    needs:
      - backend-tests
      - frontend-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            image: orrery-backend
            context: .
            file: Dockerfile.backend
          - name: frontend
            image: orrery-frontend
            context: embedding_visualization
            file: embedding_visualization/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ vars.ORRERY_IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,value=${{ github.event.release.tag_name }},pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,value=${{ github.event.release.tag_name }},pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true

  deploy-space:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - publish-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.3.2
      - id: seed-lock
        run: |
          if test -f interpretability_backend/config/seed_snapshots/demo.lock.json; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Space deploy until demo.lock.json is published and committed."
          fi
      - if: steps.seed-lock.outputs.ready == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO_ID: ${{ vars.HF_SPACE_REPO_ID }}
        run: >-
          uv run --no-project --with huggingface-hub python
          deploy/hf-space/deploy.py --repo-id "$HF_SPACE_REPO_ID"
