# nginx front door for the single-container HF Space demo.
# Runs as the non-root Space user (uid 1000): pid + temp paths live in /tmp.
# Routing: /graphql + /health → uvicorn :8000; everything else → Next :3000.
# /upload is deliberately NOT routed (read-only demo; the backend also
# doesn't mount it when ORRERY_READ_ONLY=1).

worker_processes 1;
pid /tmp/nginx/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    client_body_temp_path /tmp/nginx/body;
    proxy_temp_path /tmp/nginx/proxy;
    fastcgi_temp_path /tmp/nginx/fastcgi;
    uwsgi_temp_path /tmp/nginx/uwsgi;
    scgi_temp_path /tmp/nginx/scgi;

    # WebSocket upgrade pass-through (insurance — demo mode opens no sockets,
    # but a duplicated Space with writes enabled uses subscriptions).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 7860;

        # GraphQL over HTTP and WebSocket.
        location /graphql {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /health {
            proxy_pass http://127.0.0.1:8000;
        }

        # Next.js standalone server (pages + static chunks).
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
