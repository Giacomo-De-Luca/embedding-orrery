# Full-corpus stage-1 collect.
#
# Iterates every (word, synset) pair in WordNet 2024 through Gemma-3-4b-it
# with the L29 / w16k / l0=medium resid_post SAE attached, captures the
# last-token feature activations, and persists them as one CSR + parquet
# pair. Stages 2-5 (extract/label/eval/score) are deliberately skipped —
# the resulting matrix is the substrate for later random-feature sweeps
# over agent configurations.
#
# Expected runtime on MPS: ~10 h (≈200 k samples × ~6.5 samples/s).
# Expected output: ~400 MB activations.npz + ~25 MB index.parquet.
# Safe to interrupt: ``resume: true`` skips (word, synset) pairs already
# present in the on-disk index.

run_slug: full_L29_16k_last

collect:
  layer_index: 29
  hook_type: resid_post
  width: "16k"
  l0_size: medium
  model_size: "4b"
  variant: it
  checkpoint: google/gemma-3-4b-it
  device: mps
  dtype: bfloat16
  aggregation: last_token
  limit: null
  pos_filter: null
  prompt_template: "{word}: {definition}."
  add_bos: true
  use_chat_template: false
  output_root: resources/sae_autointerpret
  activation_dtype: float16
  sparse_threshold: 1.0e-6
  flush_every: 500
  resume: true
  wordnet_xml_path: resources/dictionaries/english-wordnet-2024.xml

extract:
  top_k: 50
  eval_sample_count: 50
  eval_shuffle_seed: 42
  density_min: 1.0e-5
  density_max: 0.3
  require_min_nonzero: 50
  feature_indices: null

agents:
  label_task: autointerpret-label
  eval_task: autointerpret-eval
  label_workers: 5
  label_reps_per_worker: 100
  eval_workers: 5
  eval_reps_per_worker: 100
  show_zero_fraction_to_evaluator: ab
  poll_interval_seconds: 30
  label_input_dir: resources/jobs/autointerpret-label/input
  label_results_dir: resources/jobs/autointerpret-label/queue/results
  eval_input_dir: resources/jobs/autointerpret-eval/input
  eval_results_dir: resources/jobs/autointerpret-eval/queue/results
  fail_on_queue_errors: true

score:
  write_to_label_store: true
  label_store_dir: resources/sae_labels/neuronpedia_gemma-3-4b-it
  method_name: autointerpret
  min_pearson: 0.3
  report_ab_split: true

stages:
  skip_collect: false
  skip_topk: true
  skip_label: true
  skip_eval: true
  skip_score: true
